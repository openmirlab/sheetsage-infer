name: Publish to PyPI

# This workflow publishes the package to PyPI when a GitHub Release is created.
# It uses PyPI's trusted publishing feature, which must be configured on PyPI
# for the GitHub organization and repository.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing (OIDC)
      contents: read    # Required to checkout code
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel

      - name: Install package + test dependencies
        run: |
          # numpy must land before madmom, whose setup.py imports it at build
          # time (a well-known madmom install gotcha -- see README's
          # Installation section for the same two-step pattern).
          # madmom gotchas (the reason madmom-infer exists): plain pip would
          # resolve madmom from PyPI (0.16.1, 2018: needs Cython at build time,
          # numpy-2 incompatible). Install cython+numpy first, then madmom from
          # git with --no-build-isolation, THEN the package -- its madmom
          # requirement is already satisfied so pip never touches PyPI's.
          pip install "numpy>=2.0.0" cython
          pip install --no-build-isolation "git+https://github.com/CPJKU/madmom"
          pip install -e ".[dev]"

      - name: Run test gate
        run: pytest tests/ -v

      - name: Clean previous builds
        run: |
          rm -rf dist/ build/ *.egg-info/ sheetsage.egg-info/

      - name: Build package
        run: python -m build
      
      - name: Check package
        run: |
          pip install twine
          twine check dist/*
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

